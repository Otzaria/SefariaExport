name: Sefaria Export via Docker Compose

on:
  workflow_dispatch:
    inputs:
      timezone:
        description: "Timezone for timestamp/tag (IANA name)"
        required: false
        default: "Asia/Jerusalem"

permissions:
  contents: write

env:
  TZ_NAME: ${{ inputs.timezone || 'Asia/Jerusalem' }}

jobs:
  export_release:
    runs-on: self-hosted
    timeout-minutes: 4320

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Compute release timestamp
        id: ts
        run: |
          TS_STAMP=$(TZ="${TZ_NAME}" date '+%Y-%m-%d_%H-%M')
          echo "stamp=$TS_STAMP" >> "$GITHUB_OUTPUT"
          echo "Timestamp: $TS_STAMP"

      - name: Prepare host artifact directories
        id: hostdirs
        run: |
          ARTIFACT_ROOT="${RUNNER_TEMP}/sefaria-export-${{ github.run_id }}-${{ steps.ts.outputs.stamp }}"
          EXPORTS_HOST_DIR="${ARTIFACT_ROOT}/exports"
          OUTPUT_HOST_DIR="${ARTIFACT_ROOT}/output"
          mkdir -p "${EXPORTS_HOST_DIR}" "${OUTPUT_HOST_DIR}"

          echo "artifact_root=${ARTIFACT_ROOT}" >> "$GITHUB_OUTPUT"
          echo "exports_dir=${EXPORTS_HOST_DIR}" >> "$GITHUB_OUTPUT"
          echo "output_dir=${OUTPUT_HOST_DIR}" >> "$GITHUB_OUTPUT"

      - name: Run export pipeline via Docker Compose
        env:
          TS_STAMP: ${{ steps.ts.outputs.stamp }}
          EXPORTS_HOST_DIR: ${{ steps.hostdirs.outputs.exports_dir }}
          OUTPUT_HOST_DIR: ${{ steps.hostdirs.outputs.output_dir }}
        run: docker compose up --build --abort-on-container-exit

      - name: Stop and clean up containers
        if: always()
        run: docker compose down --volumes --remove-orphans

      - name: Move archives to workspace root
        run: |
          shopt -s nullglob
          FILES=( "${{ steps.hostdirs.outputs.output_dir }}"/sefaria-exports-*.tar.zst* )
          if [ "${#FILES[@]}" -gt 0 ]; then
            cp -f "${FILES[@]}" ./
          fi

      - name: Ensure gh CLI
        run: |
          chmod +x ./19_ensure_gh_cli.sh
          bash ./19_ensure_gh_cli.sh

      - name: Create/Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TS_STAMP: ${{ steps.ts.outputs.stamp }}
        run: |
          chmod +x ./20_create_or_update_release.sh
          bash ./20_create_or_update_release.sh

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TS_STAMP: ${{ steps.ts.outputs.stamp }}
        run: |
          chmod +x ./21_upload_release_assets.sh
          bash ./21_upload_release_assets.sh

      - name: Clean host artifact directories
        if: always()
        run: |
          TARGET="${{ steps.hostdirs.outputs.artifact_root }}"
          if [ -n "${TARGET}" ] && [ -e "${TARGET}" ]; then
            rm -rf "${TARGET}" 2>/dev/null || sudo rm -rf "${TARGET}"
          fi
