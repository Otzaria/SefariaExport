name: Sefaria Export via Docker Compose

on:
  workflow_dispatch:
    inputs:
      timezone:
        description: "Timezone for timestamp/tag (IANA name)"
        required: false
        default: "Asia/Jerusalem"
      export_scope:
        description: "Export scope for this run"
        required: false
        type: choice
        default: "smoke"
        options:
          - smoke
          - full
      export_functions:
        description: "Optional comma-separated export functions override"
        required: false
        default: ""

permissions:
  contents: write

env:
  TZ_NAME: ${{ inputs.timezone || 'Asia/Jerusalem' }}
  EXPORT_SCOPE: ${{ inputs.export_scope || 'smoke' }}

jobs:
  export_release:
    runs-on: self-hosted
    timeout-minutes: 4320

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Compute release timestamp
        id: ts
        run: |
          TS_STAMP=$(TZ="${TZ_NAME}" date '+%Y-%m-%d_%H-%M')
          echo "stamp=$TS_STAMP" >> "$GITHUB_OUTPUT"
          echo "Timestamp: $TS_STAMP"

      - name: Prepare host artifact directories
        id: hostdirs
        run: |
          ARTIFACT_ROOT="${RUNNER_TEMP}/sefaria-export-${{ github.run_id }}-${{ steps.ts.outputs.stamp }}"
          EXPORTS_HOST_DIR="${ARTIFACT_ROOT}/exports"
          OUTPUT_HOST_DIR="${ARTIFACT_ROOT}/output"
          mkdir -p "${EXPORTS_HOST_DIR}" "${OUTPUT_HOST_DIR}"

          echo "artifact_root=${ARTIFACT_ROOT}" >> "$GITHUB_OUTPUT"
          echo "exports_dir=${EXPORTS_HOST_DIR}" >> "$GITHUB_OUTPUT"
          echo "output_dir=${OUTPUT_HOST_DIR}" >> "$GITHUB_OUTPUT"

          echo "Artifact root: ${ARTIFACT_ROOT}"
          ls -ld "${ARTIFACT_ROOT}" "${EXPORTS_HOST_DIR}" "${OUTPUT_HOST_DIR}"

      - name: Determine export scope
        id: scope
        run: |
          if [ -n "${{ inputs.export_functions }}" ]; then
            EXPORT_FUNCTIONS="${{ inputs.export_functions }}"
          elif [ "${EXPORT_SCOPE}" = "smoke" ]; then
            EXPORT_FUNCTIONS="export_toc,export_schemas"
          else
            EXPORT_FUNCTIONS=""
          fi

          echo "functions=${EXPORT_FUNCTIONS}" >> "$GITHUB_OUTPUT"
          if [ -n "${EXPORT_FUNCTIONS}" ]; then
            echo "Selected export functions: ${EXPORT_FUNCTIONS}"
          else
            echo "Selected export functions: default full set"
          fi

      - name: Run export pipeline via Docker Compose
        env:
          TS_STAMP: ${{ steps.ts.outputs.stamp }}
          SEFARIA_EXPORT_FUNCTIONS: ${{ steps.scope.outputs.functions }}
          EXPORTS_HOST_DIR: ${{ steps.hostdirs.outputs.exports_dir }}
          OUTPUT_HOST_DIR: ${{ steps.hostdirs.outputs.output_dir }}
        run: docker compose up --build --abort-on-container-exit

      - name: Stop and clean up containers
        if: always()
        run: docker compose down --volumes --remove-orphans

      - name: Inspect generated archives in output
        run: |
          shopt -s nullglob
          FILES=( "${{ steps.hostdirs.outputs.output_dir }}"/sefaria-exports-*.tar.zst* )
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "❌ No release archives found after export"
            echo "Output directory: ${{ steps.hostdirs.outputs.output_dir }}"
            ls -lah "${{ steps.hostdirs.outputs.output_dir }}" || true
            exit 1
          fi
          echo "📦 Found ${#FILES[@]} archive candidate(s) in output/"
          ls -lah "${FILES[@]}"

      - name: Stage release archives in workspace root
        run: |
          shopt -s nullglob
          OUTPUT_FILES=( "${{ steps.hostdirs.outputs.output_dir }}"/sefaria-exports-*.tar.zst* )
          if [ "${#OUTPUT_FILES[@]}" -eq 0 ]; then
            echo "❌ No release archives available to stage from output/"
            ls -lah "${{ steps.hostdirs.outputs.output_dir }}" || true
            exit 1
          fi

          cp -f "${OUTPUT_FILES[@]}" ./

          ROOT_FILES=( ./sefaria-exports-*.tar.zst* )
          if [ "${#ROOT_FILES[@]}" -eq 0 ]; then
            echo "❌ Failed to stage release archives into workspace root"
            echo "Workspace root:"
            ls -lah .
            echo "Output directory:"
            ls -lah "${{ steps.hostdirs.outputs.output_dir }}" || true
            exit 1
          fi

          echo "📦 Staged ${#ROOT_FILES[@]} archive(s) in workspace root"
          ls -lah "${ROOT_FILES[@]}"

      - name: Ensure gh CLI
        run: |
          chmod +x ./19_ensure_gh_cli.sh
          bash ./19_ensure_gh_cli.sh

      - name: Create/Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TS_STAMP: ${{ steps.ts.outputs.stamp }}
        run: |
          chmod +x ./20_create_or_update_release.sh
          bash ./20_create_or_update_release.sh

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TS_STAMP: ${{ steps.ts.outputs.stamp }}
        run: |
          chmod +x ./21_upload_release_assets.sh
          bash ./21_upload_release_assets.sh

      - name: Clean host artifact directories
        if: always()
        run: |
          TARGET="${{ steps.hostdirs.outputs.artifact_root }}"
          if [ -n "${TARGET}" ] && [ -e "${TARGET}" ]; then
            rm -rf "${TARGET}" 2>/dev/null || sudo rm -rf "${TARGET}"
          fi
