name: Sefaria Export via Docker Compose

on:
  workflow_dispatch:
    inputs:
      timezone:
        description: "Timezone for timestamp/tag (IANA name)"
        required: false
        default: "Asia/Jerusalem"
      export_scope:
        description: "Export scope for this run"
        required: false
        type: choice
        default: "smoke"
        options:
          - smoke
          - full
      export_functions:
        description: "Optional comma-separated export functions override"
        required: false
        default: ""

permissions:
  contents: write

env:
  TZ_NAME: ${{ inputs.timezone || 'Asia/Jerusalem' }}
  EXPORT_SCOPE: ${{ inputs.export_scope || 'smoke' }}

jobs:
  export_release:
    runs-on: self-hosted
    timeout-minutes: 4320

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Compute release timestamp
        id: ts
        run: |
          TS_STAMP=$(TZ="${TZ_NAME}" date '+%Y-%m-%d_%H-%M')
          echo "stamp=$TS_STAMP" >> "$GITHUB_OUTPUT"
          echo "Timestamp: $TS_STAMP"

      - name: Determine export scope
        id: scope
        run: |
          if [ -n "${{ inputs.export_functions }}" ]; then
            EXPORT_FUNCTIONS="${{ inputs.export_functions }}"
          elif [ "${EXPORT_SCOPE}" = "smoke" ]; then
            EXPORT_FUNCTIONS="export_toc,export_schemas"
          else
            EXPORT_FUNCTIONS=""
          fi

          echo "functions=${EXPORT_FUNCTIONS}" >> "$GITHUB_OUTPUT"
          if [ -n "${EXPORT_FUNCTIONS}" ]; then
            echo "Selected export functions: ${EXPORT_FUNCTIONS}"
          else
            echo "Selected export functions: default full set"
          fi

      - name: Run export pipeline via Docker Compose
        env:
          TS_STAMP: ${{ steps.ts.outputs.stamp }}
          SEFARIA_EXPORT_FUNCTIONS: ${{ steps.scope.outputs.functions }}
        run: docker compose up --build --abort-on-container-exit

      - name: Stop and clean up containers
        if: always()
        run: docker compose down --volumes --remove-orphans

      - name: Inspect generated archives
        run: |
          shopt -s nullglob
          FILES=( ./output/sefaria-exports-*.tar.zst* sefaria-exports-*.tar.zst* )
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "❌ No release archives found after export"
            echo "Workspace root:"
            ls -lah .
            echo "Output directory:"
            ls -lah ./output || true
            exit 1
          fi
          echo "📦 Found ${#FILES[@]} archive candidate(s)"
          ls -lah "${FILES[@]}"

      - name: Ensure gh CLI
        run: |
          chmod +x ./19_ensure_gh_cli.sh
          bash ./19_ensure_gh_cli.sh

      - name: Create/Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TS_STAMP: ${{ steps.ts.outputs.stamp }}
        run: |
          chmod +x ./20_create_or_update_release.sh
          bash ./20_create_or_update_release.sh

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TS_STAMP: ${{ steps.ts.outputs.stamp }}
        run: |
          chmod +x ./21_upload_release_assets.sh
          bash ./21_upload_release_assets.sh
